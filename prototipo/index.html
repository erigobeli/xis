<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="X – Acontecendo agora. Inscreva-se hoje.">
  <title>X – Acontecendo agora</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/login.css">

  <!-- Favicon (X logo) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z'/></svg>">
</head>
<body>

  <main class="login-layout login-page" id="login-page">
    <!-- Left: X Logo -->
    <div class="login-layout__logo">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>
    </div>

    <!-- Right: Content -->
    <div class="login-layout__content">
      <h1 class="login-content__title">Acontecendo agora</h1>
      <h2 class="login-content__subtitle">Inscreva-se hoje</h2>

      <button class="login-content__create-btn" id="btn-create-account">Criar conta</button>

      <p class="login-content__terms">
        Ao se inscrever, você concorda com os <a href="#">Termos de Serviço</a> e
        a <a href="#">Política de Privacidade</a>, incluindo o <a href="#">Uso de Cookies</a>.
      </p>

      <div class="login-content__login-section">
        <p class="login-content__login-label">Já tem uma conta?</p>
        <a href="home.html" class="login-content__login-btn" id="btn-login">Entrar</a>
      </div>
    </div>
  </main>

</body>
</html>
